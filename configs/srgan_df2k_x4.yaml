name: srgan_df2k_x4

# Stage 1: train SRGAN on DF2K synthetic bicubic LR-HR pairs.
# SRGAN's Generator has internal PixelShuffle upsampling (4×), so it takes
# the raw LR image (NOT pre-upscaled). Set pre_upscale: false.
#
# Adversarial training: the Trainer detects the dict return from compute_loss
# and runs separate generator/discriminator optimization steps.

model:
  name: SRGAN
  args:
    scale: 4
    num_features: 64
    num_blocks: 16          # SRResNet: 16 residual blocks
    perceptual_layer: relu5_4
    perceptual_weight: 6.0e-3  # paper: VGG54 content rescale 1/12.75^2
    adversarial_weight: 1.0e-3
    loss: l2                  # pixel loss (paper uses MSE = l2)

train:
  epochs: 6                 # 6 epoch x 30581 tiles ~ ngân sách 50 epoch x 3450 ảnh gốc
  batch_size: 16            # 128 OOM trên 8GB (VGG19 perceptual + discriminator)
  num_workers: 8
  loss: l2                  # pixel loss for build_loss (l2 = MSE, per paper)
  perceptual_weight: 0.0    # not used (SRGAN handles its own perceptual)
  lr: 1.0e-4                # generator LR
  d_lr: 1.0e-4              # discriminator LR
  lr_step: 3                # giảm LR một lần ở giữa run (6 epoch)
  lr_gamma: 0.5
  val_every: 1
  early_stop_patience: 3    # dừng nếu lpips không cải thiện sau 3 lần validation
  early_stop_metric: lpips
  discriminator:
    lr: 1.0e-4
    beta1: 0.9
    beta2: 0.999

train_dataset:
  name: DIV2K
  args:
    hr_dir: data/DF2K_sub         # tiles 480x480 cắt sẵn (scripts/extract_subimages.py)
    scale: 4
    patch_size: 96            # paper: HR patch 96 (LR 24)
    pre_upscale: false
    degradation: bicubic
    augment: true
    repeat: 1                 # 1 epoch = 1 lượt qua 30581 tiles

val_datasets:
  - { name: Benchmark, label: DIV2K-Val, args: { hr_dir: data/DIV2K/DIV2K_valid_HR, scale: 4, pre_upscale: false, max_hr: 256 } }

val_metrics: [lpips, psnr, ssim]

test_datasets:
  - { name: Benchmark, label: DIV2K-Val, args: { hr_dir: data/DIV2K/DIV2K_valid_HR, scale: 4, pre_upscale: false, max_hr: 256 } }

metrics:
  - { name: psnr,  args: { crop: 4, y_channel: true } }
  - { name: ssim,  args: { crop: 4, y_channel: true } }
  - { name: lpips, args: { net: alex } }
  - niqe
  - musiq
  - clipiqa
