name: sr3_df2k_x4

# Stage 1: pretrain SR3 (conditional diffusion) on DF2K synthetic LR-HR pairs.
# NOTE: diffusion eval samples iteratively and its UNet attention is infeasible on
# full 2K images, so DIV2K-Val is evaluated on 256x256 center crops (max_hr: 256).

model:
  name: SR3
  args:
    scale: 4
    base_channels: 64
    channel_mults: [1, 2, 4, 8]
    num_res_blocks: 2
    attn_levels: [2, 3]
    timesteps: 1000
    beta_schedule: linear
    loss_type: l1
    sampling_timesteps: 100      # DDIM steps at eval; lower = faster
    ddim_eta: 0.0

train:
  epochs: 6                 # 6 epoch x 30581 tiles ~ ngân sách 50 epoch x 3450 ảnh gốc
  batch_size: 6            # AMP bf16, đo 5.07GB (trần 6GB)
  num_workers: 8
  amp: true               # bf16 autocast, ~1.5-2x nhanh hơn tren RTX 4060
  lr: 1.0e-4
  lr_step: 3                # giảm LR một lần ở giữa run (6 epoch)
  lr_gamma: 0.5
  val_every: 1                   # val 20 ảnh (limit) ~ 3ph/lần
  early_stop_patience: 3
  early_stop_metric: psnr

train_dataset:
  name: DIV2K
  args:
    hr_dir: data/DF2K_sub         # tiles 480x480 cắt sẵn (scripts/extract_subimages.py)
    scale: 4
    patch_size: 160              # divisible by 8 = 2**(len(channel_mults)-1)
    pre_upscale: false
    degradation: bicubic
    augment: true
    repeat: 1                    # 1 epoch = 1 lượt qua 30581 tiles

val_datasets:
  # limit 20: val trong lúc train chỉ 20 ảnh (~3ph thay vì 15ph); eval cuối vẫn đủ 100
  - { name: Benchmark, label: DIV2K-Val, args: { hr_dir: data/DIV2K/DIV2K_valid_HR, scale: 4, max_hr: 256, limit: 20 } }

val_metrics: [psnr, ssim]

test_datasets:
  - { name: Benchmark, label: DIV2K-Val, args: { hr_dir: data/DIV2K/DIV2K_valid_HR, scale: 4, max_hr: 256 } }

metrics:
  - { name: psnr,  args: { crop: 4, y_channel: true } }
  - { name: ssim,  args: { crop: 4, y_channel: true } }
  - { name: lpips, args: { net: alex } }
  - niqe
  - musiq
  - clipiqa
